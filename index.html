<!doctype html>
<html lang="en">
  <head>
    
    <meta charset="UTF-8" />
    <title>PulsePlayer</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <img src="musiclogo3.webp" class="logo" alt="PulsePlayer logo" />

      <h1>PulsePlayer</h1>
    </header>

    <div class="player-container">
      <div class="album-section">
        <img id="cover" src="musiclogo3.webp" class="album-cover" alt="Album cover" />

        <h2 id="title">Song Title</h2>

        <p id="artist">Artist</p>
      </div>

      <div class="controls">
        <audio id="audio"></audio>
        <input type="range" id="progress" value="0" />

        <div class="buttons">
          <button id="prev">⏮</button>
          <button id="play">▶</button>
          <button id="next">⏭</button>
        </div>

        <div class="volume">
          🔊
          <input type="range" id="volume" min="0" max="1" step="0.01" />
        </div>
      </div>

      <div class="playlist">
        <h3>Playlist</h3>

        <ul id="playlist"></ul>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
