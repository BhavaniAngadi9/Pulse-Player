<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulsePlayer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="background-glow"></div>

    <header class="app-header">
      <div class="brand">
        <img src="images/musiclogo2.jpg" class="logo" alt="PulsePlayer logo" />
        <div class="brand-text">
          <h1>PulsePlayer</h1>
          <p class="tagline">Feel the beat. Own the vibe.</p>
        </div>
      </div>

      <div class="header-actions">
        <button id="theme-toggle" class="ghost-button" type="button">
          Light mode
        </button>
      </div>
    </header>

    <main class="layout">
      <section class="player-container">
        <div class="album-section">
          <div class="album-cover-wrapper">
            <img
              id="cover"
              src="images/musiclogo3.webp"
              class="album-cover"
              alt="Album cover"
            />
          </div>

          <div class="track-info">
            <h2 id="title">Song Title</h2>
            <p id="artist">Artist</p>
          </div>
        </div>

        <div class="controls">
          <audio id="audio"></audio>

          <div class="progress-wrapper">
            <input type="range" id="progress" value="0" />
            <div class="time-row">
              <span id="current-time">0:00</span>
              <span id="total-time">0:00</span>
            </div>
          </div>

          <div class="buttons">
            <button id="shuffle" class="icon-button" aria-label="Shuffle">
              🔀
            </button>
            <button id="prev" class="icon-button" aria-label="Previous track">
              ⏮
            </button>
            <button id="play" class="icon-button" aria-label="Play / Pause">
              ▶
            </button>
            <button id="next" class="icon-button" aria-label="Next track">
              ⏭
            </button>
            <button id="repeat" class="icon-button" aria-label="Repeat mode">
              🔁
            </button>
          </div>

          <div class="volume">
            <span class="volume-icon">🔊</span>
            <input
              type="range"
              id="volume"
              min="0"
              max="1"
              step="0.01"
              value="0.5"
            />
          </div>

          <div class="visualizer" aria-hidden="true">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
          </div>
        </div>
      </section>

      <aside class="playlist">
        <h3>Playlist</h3>
        <ul id="playlist"></ul>
      </aside>
    </main>

    <div class="mini-player" id="mini-player">
      <button id="mini-toggle" class="mini-toggle" type="button" aria-label="Toggle mini player">
        ⤢
      </button>
      <div class="mini-cover">
        <img id="mini-cover" src="images/musiclogo3.webp" alt="Current track cover" />
      </div>
      <div class="mini-track-info">
        <div id="mini-title" class="mini-title">Song Title</div>
        <div id="mini-artist" class="mini-artist">Artist</div>
      </div>
      <div class="mini-controls">
        <button id="mini-prev" class="mini-button" type="button" aria-label="Previous track">
          ⏮
        </button>
        <button id="mini-play" class="mini-button" type="button" aria-label="Play / Pause">
          ▶
        </button>
        <button id="mini-next" class="mini-button" type="button" aria-label="Next track">
          ⏭
        </button>
      </div>
      <div class="mini-progress-wrapper">
        <div id="mini-current-time" class="mini-time">0:00</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
